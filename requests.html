<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전문진단 요청 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root{--bg:#f3f5f8;--card:#fff;--ink:#111827;--text:#344054;--muted:#8b95a7;--line:#e2e8f0;--blue:#235eff;--blue2:#eef4ff;--green:#00a86b;--red:#e5484d;--yellow:#f2a51a;--shadow:0 16px 42px rgba(31,41,55,.10)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif}.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:30px 0 48px}.top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.top h1{font-size:30px;letter-spacing:0}.top p{margin-top:7px;color:var(--muted);font-size:14px}.link{height:40px;display:inline-flex;align-items:center;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--blue);text-decoration:none;font-size:13px;font-weight:900}.auth{display:grid;grid-template-columns:1fr 124px;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 8px 20px rgba(31,41,55,.04);margin-bottom:14px}.auth input,.search input{height:46px;border:1px solid #d8e0eb;border-radius:8px;padding:0 12px;font:inherit}.auth button,.search button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:950}.status{color:#b42332;font-size:13px;margin:10px 2px}.stats{display:none;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:0 8px 20px rgba(31,41,55,.04)}.stat b{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.stat span{font-size:24px;font-weight:950;font-variant-numeric:tabular-nums}.search{display:none;grid-template-columns:1fr 120px;gap:8px;margin:14px 0}.list{display:grid;gap:10px}.empty{background:#fff;border:1px solid var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted)}.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 20px rgba(31,41,55,.04);overflow:hidden}.card-main{display:grid;grid-template-columns:190px 150px 90px 1fr;gap:14px;padding:15px 16px;align-items:start}.date{font-size:12px;color:var(--muted);font-weight:800;line-height:1.5}.phone{font-size:18px;font-weight:950;letter-spacing:0}.score{font-size:13px;font-weight:900}.score strong{display:block;font-size:22px;font-variant-numeric:tabular-nums}.grade{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:28px;border-radius:999px;background:var(--blue2);color:var(--blue);font-size:13px;font-weight:950;margin-top:7px}.summary h3{font-size:14px;margin-bottom:5px}.summary p{color:var(--text);font-size:13px;line-height:1.65}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}.pill{display:inline-flex;height:25px;align-items:center;border-radius:999px;background:#f8fafc;border:1px solid var(--line);padding:0 8px;color:#667085;font-size:11px;font-weight:850}.actions{display:flex;gap:8px;padding:0 16px 15px 16px}.action{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;color:#344054;font-size:12px;font-weight:900}.action.primary{background:#111827;color:#fff;border-color:#111827}.copied{color:var(--green);font-size:12px;font-weight:900;margin-left:4px}.guide{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;color:#475467;font-size:13px;line-height:1.7}.guide b{color:#111827}.hidden{display:none!important}@media(max-width:860px){.top{display:block}.link{margin-top:12px}.auth,.search{grid-template-columns:1fr}.auth button,.search button{height:46px}.stats{grid-template-columns:repeat(2,1fr)}.card-main{grid-template-columns:1fr}.actions{flex-wrap:wrap}.action{flex:1 1 auto}}@media(max-width:480px){.wrap{width:min(100% - 24px,1180px);padding-top:22px}.stats{grid-template-columns:1fr}.phone{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>전문진단 요청 관리</h1><p>전화번호와 진단 요약만 표시됩니다. 업로드 이미지는 저장하지 않습니다.</p></div>
    <a class="link" href="/">진단 페이지로 이동</a>
  </div>

  <div class="auth" id="authBox">
    <input id="token" type="password" placeholder="관리자 토큰 입력">
    <button id="loadBtn">목록 보기</button>
  </div>
  <div class="status" id="status"></div>

  <section class="stats" id="stats">
    <div class="stat"><b>전체 요청</b><span id="totalCount">0</span></div>
    <div class="stat"><b>오늘 요청</b><span id="todayCount">0</span></div>
    <div class="stat"><b>평균 점수</b><span id="avgScore">-</span></div>
    <div class="stat"><b>최근 신청</b><span id="lastTime">-</span></div>
  </section>

  <div class="search" id="searchBox">
    <input id="searchInput" placeholder="전화번호, 요약, 등급으로 검색">
    <button id="refreshBtn">새로고침</button>
  </div>

  <div class="list" id="list"><div class="empty">관리자 토큰을 입력하면 전문진단 요청 목록이 표시됩니다.</div></div>

  <div class="guide">
    <b>운영 팁</b><br>
    신청자에게 연락하기 전에 점수, 등급, 요약을 먼저 확인하세요. 상담 메모가 필요하면 Supabase 테이블에 memo/status 컬럼을 추가하면 관리 기능을 더 확장할 수 있습니다.
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let token='';
let rows=[];
$('loadBtn').addEventListener('click',loadRows);
$('refreshBtn').addEventListener('click',loadRows);
$('token').addEventListener('keydown',e=>{if(e.key==='Enter')loadRows();});
$('searchInput').addEventListener('input',()=>render(filterRows(rows)));
async function loadRows(){
  token=$('token').value.trim()||token;
  $('status').textContent='';
  if(!token){$('status').textContent='관리자 토큰을 입력해 주세요.';return;}
  try{
    $('loadBtn').disabled=true;
    $('refreshBtn').disabled=true;
    const res=await fetch('/api/consultation?token='+encodeURIComponent(token));
    const data=await res.json().catch(()=>({}));
    if(!res.ok)throw new Error(data.error||'목록을 불러오지 못했어요.');
    rows=data.rows||[];
    $('stats').style.display='grid';
    $('searchBox').style.display='grid';
    $('authBox').classList.add('hidden');
    updateStats(rows);
    render(filterRows(rows));
  }catch(e){$('status').textContent=e.message;}
  finally{$('loadBtn').disabled=false;$('refreshBtn').disabled=false;}
}
function filterRows(list){
  const q=$('searchInput')?.value.trim().toLowerCase()||'';
  if(!q)return list;
  return list.filter(r=>[r.phone,r.grade,r.score,r.detected_app,r.summary].some(v=>String(v||'').toLowerCase().includes(q)));
}
function updateStats(list){
  $('totalCount').textContent=list.length;
  const today=new Date().toDateString();
  $('todayCount').textContent=list.filter(r=>r.created_at&&new Date(r.created_at).toDateString()===today).length;
  const scores=list.map(r=>Number(r.score)).filter(Number.isFinite);
  $('avgScore').textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):'-';
  $('lastTime').textContent=list[0]?.created_at?relativeTime(new Date(list[0].created_at)):'-';
}
function render(list){
  if(!list.length){$('list').innerHTML='<div class="empty">표시할 요청이 없습니다.</div>';return;}
  $('list').innerHTML=list.map((r,i)=>card(r,i)).join('');
  document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',copyPhone));
}
function card(r,i){
  const created=r.created_at?new Date(r.created_at):null;
  const createdText=created?created.toLocaleString('ko-KR'):'-';
  const phone=formatPhone(r.phone);
  return `<article class="card">
    <div class="card-main">
      <div class="date">신청일<br>${esc(createdText)}<br>${created?esc(relativeTime(created)):''}</div>
      <div><div class="phone">${phone}</div><span class="grade">${esc(r.grade||'-')} 등급</span></div>
      <div class="score">점수<strong>${r.score??'-'}</strong></div>
      <div class="summary"><h3>진단 요약</h3><p>${esc(r.summary||'요약 없음')}</p><div class="meta"><span class="pill">${esc(r.detected_app||'앱 미확인')}</span><span class="pill">보유 ${r.holdings_count??0}개</span><span class="pill">${esc(r.source||'portfolio')}</span></div></div>
    </div>
    <div class="actions"><button class="action primary" data-copy="${esc(String(r.phone||''))}">전화번호 복사</button><a class="action" href="tel:${esc(String(r.phone||''))}">전화 걸기</a><span class="copied" id="copied-${i}"></span></div>
  </article>`;
}
async function copyPhone(e){
  const phone=e.currentTarget.getAttribute('data-copy');
  try{await navigator.clipboard.writeText(phone);e.currentTarget.textContent='복사 완료';setTimeout(()=>e.currentTarget.textContent='전화번호 복사',1200);}catch(_){alert(phone);}
}
function formatPhone(v){const s=String(v||'');if(s.length===11)return s.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');if(s.length===10)return s.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');return esc(s||'-');}
function relativeTime(d){const diff=Math.max(0,Date.now()-d.getTime());const m=Math.floor(diff/60000);if(m<1)return '방금 전';if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';return Math.floor(h/24)+'일 전';}
function esc(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
</script>
</body>
</html>
