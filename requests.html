<html lang="ko">
<head>

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<style>
:root{--bg:#f3f5f8;--card:#fff;--ink:#111827;--text:#344054;--muted:#8b95a7;--line:#e2e8f0;--blue:#235eff;--blue2:#eef4ff;--green:#00a86b;--red:#e5484d;--shadow:0 16px 42px rgba(31,41,55,.10)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif}.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:30px 0 48px}.top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.top h1{font-size:30px;letter-spacing:0}.top p{margin-top:7px;color:var(--muted);font-size:14px}.link{height:40px;display:inline-flex;align-items:center;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--blue);text-decoration:none;font-size:13px;font-weight:900}.auth{display:grid;grid-template-columns:1fr 124px 96px;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 8px 20px rgba(31,41,55,.04);margin-bottom:14px}.auth input,.search input{height:46px;border:1px solid #d8e0eb;border-radius:8px;padding:0 12px;font:inherit}.auth button,.search button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:950}.auth .ghost{background:#fff;color:#475467;border:1px solid var(--line)}.status{color:#b42332;font-size:13px;margin:10px 2px}.stats{display:none;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:0 8px 20px rgba(31,41,55,.04)}.stat b{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.stat span{font-size:24px;font-weight:950;font-variant-numeric:tabular-nums}.search{display:none;grid-template-columns:1fr 120px;gap:8px;margin:14px 0}.list{display:grid;gap:10px}.empty{background:#fff;border:1px solid var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted)}.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 20px rgba(31,41,55,.04);overflow:hidden}.card-main{display:grid;grid-template-columns:190px 170px 110px 1fr;gap:14px;padding:15px 16px;align-items:start}.date{font-size:12px;color:var(--muted);font-weight:800;line-height:1.55}.phone{font-size:19px;font-weight:950;letter-spacing:0}.score{font-size:13px;font-weight:900}.score strong{display:block;font-size:22px;font-variant-numeric:tabular-nums}.grade{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:28px;border-radius:999px;background:var(--blue2);color:var(--blue);font-size:13px;font-weight:950;margin-top:7px}.summary h3{font-size:14px;margin-bottom:5px}.summary p{color:var(--text);font-size:13px;line-height:1.65}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}.pill{display:inline-flex;min-height:25px;align-items:center;border-radius:999px;background:#f8fafc;border:1px solid var(--line);padding:5px 8px;color:#667085;font-size:11px;font-weight:850;line-height:1.2}.pill.db{background:#eef4ff;color:#235eff;border-color:#d8e6ff}.pill.form{background:#ecfdf3;color:#027a48;border-color:#abefc6}.source-box{margin-top:10px;padding:10px;border-radius:10px;background:#fbfcff;border:1px solid #edf1f6;color:#475467;font-size:12px;line-height:1.6}.source-box b{color:#111827}.source-box a{color:#235eff;text-decoration:none;word-break:break-all}.image-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}.image-link{position:relative;display:block;aspect-ratio:9/14;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#eef3f9}.image-link img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}.image-link span{position:absolute;left:6px;bottom:6px;height:22px;padding:0 7px;border-radius:999px;background:rgba(17,24,39,.78);color:#fff;font-size:11px;font-weight:900;display:inline-flex;align-items:center}.actions{display:flex;gap:8px;padding:0 16px 15px 16px;align-items:center}.action{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;color:#344054;font-size:12px;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.action.primary{background:#111827;color:#fff;border-color:#111827}.copied{color:var(--green);font-size:12px;font-weight:900;margin-left:4px}.guide{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;color:#475467;font-size:13px;line-height:1.7}.guide b{color:#111827}.hidden{display:none!important}@media(max-width:980px){.card-main{grid-template-columns:1fr 1fr}.summary{grid-column:1/-1}}@media(max-width:860px){.top{display:block}.link{margin-top:12px}.auth,.search{grid-template-columns:1fr}.auth button,.search button{height:46px}.stats{grid-template-columns:repeat(2,1fr)}.card-main{grid-template-columns:1fr}.actions{flex-wrap:wrap}.action{flex:1 1 auto}}@media(max-width:480px){.wrap{width:min(100% - 24px,1180px);padding-top:22px}.stats{grid-template-columns:1fr}.phone{font-size:20px}.image-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
/* 2026 editorial operations redesign */
:root{--bg:#f2f6f3;--card:#fff;--ink:#101714;--text:#34443d;--muted:#718078;--line:#dce5df;--blue:#176b52;--blue2:#edf7f2;--green:#13a678;--red:#dc4554;--shadow:0 16px 44px rgba(23,54,43,.08)}
body{background:linear-gradient(180deg,#f9fbfa 0,#f1f5f2 100%);color:var(--ink)}.wrap{width:min(1220px,calc(100% - 40px));padding:44px 0 64px}.top{align-items:center;margin-bottom:24px}.top h1{font-size:32px}.top p{color:#6a7971}.link{height:42px;border-radius:6px;border-color:#d4ded8;background:transparent;color:#176b52}
.auth{grid-template-columns:1fr 124px 104px;gap:8px;padding:10px;border-radius:8px;border-color:#d8e2dc;background:#fff;box-shadow:none}.auth input,.search input{height:48px;border-radius:6px;border-color:#cdd9d2;background:#fbfcfb}.auth input:focus,.search input:focus{outline:0;border-color:#176b52;box-shadow:0 0 0 4px rgba(23,107,82,.1)}.auth button,.search button{border-radius:6px;background:#111915}.auth .ghost{background:#fff;color:#405048;border-color:#d4ded8}.status{color:#b43c49}
.stats{gap:8px}.stat{padding:18px;border-radius:8px;border-color:#dce5df;box-shadow:none}.stat b{color:#75837c}.stat span{font-size:28px}.search{gap:8px}.empty{border-radius:8px;border-color:#dce5df}.list{gap:8px}.card{border-radius:8px;border-color:#dce5df;box-shadow:none}.card:hover{border-color:#b9cbc1;box-shadow:0 14px 38px rgba(23,54,43,.07)}.card-main{grid-template-columns:190px 170px 110px minmax(0,1fr);padding:18px 20px}.date{color:#78857e}.grade{border-radius:999px;background:#edf7f2;color:#176b52}.summary p{color:#4a5a52}.pill{border-radius:999px;border-color:#dce5df;background:#f8faf9}.pill.db{border-color:#cce0d5;background:#edf7f2;color:#176b52}.source-box{border-radius:6px;border-color:#e1e8e4;background:#f8faf9}.source-box a{color:#176b52}.image-link{border-radius:6px}.actions{padding:0 20px 18px}.action{height:38px;border-radius:6px;border-color:#d4ded8}.action.primary{background:#111915;border-color:#111915}.copied{color:#176b52}.guide{border-radius:8px;border-color:#dce5df;background:#fff}
@keyframes requestEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.stat,.card{animation:requestEnter .4s ease both}
@media(max-width:980px){.card-main{grid-template-columns:1fr 1fr}.summary{grid-column:1/-1}}
@media(max-width:860px){.wrap{width:min(100% - 24px,1220px);padding-top:24px}.top{display:block}.top h1{font-size:27px}.link{margin-top:14px}.auth,.search{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.card-main{grid-template-columns:1fr}.summary{grid-column:auto}.actions{flex-wrap:wrap}}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.stat{padding:14px}.stat span{font-size:23px}.phone{font-size:19px}.image-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>무료 점검 요청 관리</h1><p>번호로 검색하면 신청 위치, DB 이름, 접수 시간을 바로 확인할 수 있습니다.</p></div>
    <a class="link" href="/">리포트 페이지로 이동</a>
  </div>

  <div class="auth" id="authBox">
    <input id="token" type="password" placeholder="관리자 토큰 입력">
    <button id="loadBtn">목록 보기</button>
    <button class="ghost" id="clearTokenBtn" type="button">토큰 지우기</button>
  </div>
  <div class="status" id="status"></div>

  <section class="stats" id="stats">
    <div class="stat"><b>전체 신청</b><span id="totalCount">0</span></div>
    <div class="stat"><b>오늘 신청</b><span id="todayCount">0</span></div>
    <div class="stat"><b>평균 점수</b><span id="avgScore">-</span></div>
    <div class="stat"><b>최근 신청</b><span id="lastTime">-</span></div>
  </section>

  <div class="search" id="searchBox">
    <input id="searchInput" placeholder="전화번호, DB명, 신청폼, 유입명, 요약으로 검색">
    <button id="refreshBtn">새로고침</button>
  </div>

  <div class="list" id="list"><div class="empty">관리자 토큰을 입력하면 무료 점검 신청 목록이 표시됩니다.</div></div>

  <div class="guide">
    <b>검색 팁</b><br>
    전화번호는 하이픈 없이 일부만 입력해도 찾습니다. 예: 0101234. DB명은 신청 페이지 URL에 <b>?db=DB이름</b> 또는 <b>?form=신청폼이름</b>을 붙이면 앞으로 들어오는 신청부터 자동으로 남습니다.
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const TOKEN_KEY='portfolio_admin_token';
let token='';
let rows=[];
$('loadBtn').addEventListener('click',loadRows);
$('refreshBtn').addEventListener('click',loadRows);
$('token').addEventListener('keydown',e=>{if(e.key==='Enter')loadRows();});
$('searchInput').addEventListener('input',()=>render(filterRows(rows)));
$('clearTokenBtn').addEventListener('click',clearSavedToken);
const savedToken=localStorage.getItem(TOKEN_KEY)||'';
if(savedToken){token=savedToken;$('token').value=savedToken;loadRows();}
async function loadRows(){
  token=$('token').value.trim()||token;
  const q=$('searchInput')?.value.trim()||'';
  $('status').textContent='';
  if(!token){$('status').textContent='관리자 토큰을 입력해 주세요.';return;}
  try{
    $('loadBtn').disabled=true;
    $('refreshBtn').disabled=true;
    const url='/api/consultation?token='+encodeURIComponent(token)+(q?'&q='+encodeURIComponent(q):'');
    const res=await fetch(url);
    const data=await res.json().catch(()=>({}));
    if(!res.ok)throw new Error(data.error||'목록을 불러오지 못했어요.');
    localStorage.setItem(TOKEN_KEY,token);
    rows=data.rows||[];
    $('stats').style.display='grid';
    $('searchBox').style.display='grid';
    $('status').textContent=q?`"${q}" 검색 결과입니다.`:'관리자 토큰이 저장됐습니다.';
    updateStats(rows);
    render(filterRows(rows));
  }catch(e){$('status').textContent=e.message;if(String(e.message||'').includes('토큰'))localStorage.removeItem(TOKEN_KEY);}
  finally{$('loadBtn').disabled=false;$('refreshBtn').disabled=false;}
}
function clearSavedToken(){
  localStorage.removeItem(TOKEN_KEY);
  token='';
  rows=[];
  $('token').value='';
  $('stats').style.display='none';
  $('searchBox').style.display='none';
  $('list').innerHTML='<div class="empty">관리자 토큰을 입력하면 무료 점검 신청 목록이 표시됩니다.</div>';
  $('status').textContent='저장된 토큰을 지웠습니다.';
}
function filterRows(list){
  const q=$('searchInput')?.value.trim().toLowerCase()||'';
  if(!q)return list;
  const digits=q.replace(/[^0-9]/g,'');
  return list.filter(r=>{
    const phone=String(r.phone||'');
    const values=[r.phone,r.grade,r.score,r.detected_app,r.summary,r.source,r.db_name,r.form_name,r.landing_url,r.referrer,r.utm_source,r.utm_medium,r.utm_campaign];
    return (digits&&phone.includes(digits))||values.some(v=>String(v||'').toLowerCase().includes(q));
  });
}
function updateStats(list){
  $('totalCount').textContent=list.length;
  const today=new Date().toDateString();
  $('todayCount').textContent=list.filter(r=>r.created_at&&new Date(r.created_at).toDateString()===today).length;
  const scores=list.map(r=>Number(r.score)).filter(Number.isFinite);
  $('avgScore').textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):'-';
  $('lastTime').textContent=list[0]?.created_at?relativeTime(new Date(list[0].created_at)):'-';
}
function render(list){
  if(!list.length){$('list').innerHTML='<div class="empty">표시할 신청이 없습니다.</div>';return;}
  $('list').innerHTML=list.map((r,i)=>card(r,i)).join('');
  document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',copyPhone));
}
function card(r,i){
  const created=r.created_at?new Date(r.created_at):null;
  const createdText=created?created.toLocaleString('ko-KR'):'-';
  const phone=formatPhone(r.phone);
  const dbName=r.db_name||'포트폴리오 무료점검 DB';
  const formName=r.form_name||'무료 포트폴리오 점검 신청';
  const source=r.source||'portfolio_diagnosis';
  const campaign=[r.utm_source,r.utm_medium,r.utm_campaign].filter(Boolean).join(' / ');
  const landing=r.landing_url||'';
  const images=imagesFor(r);
  return `<article class="card">
    <div class="card-main">
      <div class="date">접수 시간<br>${esc(createdText)}<br>${created?esc(relativeTime(created)):''}</div>
      <div><div class="phone">${phone}</div><span class="grade">${esc(r.grade||'-')} 등급</span></div>
      <div class="score">점수<strong>${r.score??'-'}</strong></div>
      <div class="summary">
        <h3>신청 정보</h3>
        <p>${esc(r.summary||'요약 없음')}</p>
        <div class="meta">
          <span class="pill db">DB: ${esc(dbName)}</span>
          <span class="pill form">신청: ${esc(formName)}</span>
          <span class="pill">증권앱: ${esc(r.detected_app||'미확인')}</span>
          <span class="pill">보유 ${r.holdings_count??0}개</span>
          <span class="pill">유입: ${esc(source)}</span>
          ${campaign?`<span class="pill">캠페인: ${esc(campaign)}</span>`:''}
        </div>
        <div class="source-box">
          <b>어디에 신청했나:</b> ${esc(formName)}<br>
          <b>누구 DB인가:</b> ${esc(dbName)}<br>
          <b>언제 들어왔나:</b> ${esc(createdText)}
          ${landing?`<br><b>URL:</b> <a href="${esc(landing)}" target="_blank" rel="noreferrer">${esc(landing)}</a>`:''}
        </div>
        ${images.length?`<div class="image-grid">${images.map((img,idx)=>imageLink(img,idx)).join('')}</div>`:''}
      </div>
    </div>
    <div class="actions"><button class="action primary" data-copy="${esc(String(r.phone||''))}">전화번호 복사</button><a class="action" href="tel:${esc(String(r.phone||''))}">전화 걸기</a><span class="copied" id="copied-${i}"></span></div>
  </article>`;
}
function imagesFor(r){
  return Array.isArray(r.uploaded_images)?r.uploaded_images.filter(img=>img&&img.mime&&img.data).slice(0,4):[];
}
function imageLink(img,idx){
  const src=`data:${escAttr(img.mime)};base64,${String(img.data||'')}`;
  return `<a class="image-link" href="${src}" target="_blank" rel="noreferrer"><img src="${src}" alt="첨부 화면 ${idx+1}"><span>${idx+1}</span></a>`;
}
async function copyPhone(e){
  const phone=e.currentTarget.getAttribute('data-copy');
  try{await navigator.clipboard.writeText(phone);e.currentTarget.textContent='복사 완료';setTimeout(()=>e.currentTarget.textContent='전화번호 복사',1200);}catch(_){alert(phone);}
}
function formatPhone(v){const s=String(v||'');if(s.length===11)return s.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');if(s.length===10)return s.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');return esc(s||'-');}
function relativeTime(d){const diff=Math.max(0,Date.now()-d.getTime());const m=Math.floor(diff/60000);if(m<1)return '방금 전';if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';return Math.floor(h/24)+'일 전';}
function esc(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escAttr(v){return String(v).replace(/[^a-z0-9/+.-]/gi,'');}
</script>
</body>
</html>
